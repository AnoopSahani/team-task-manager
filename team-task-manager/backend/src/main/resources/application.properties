spring.application.name=team-task-manager
server.port=${PORT:8080}

# === Database ===
# Locally (no DATABASE_URL): H2 in-memory.
# On Railway: set DATABASE_URL to your Postgres connection URL.
# Two supported Railway formats:
#   1) jdbc:postgresql://host:port/db   (paste as-is into DATABASE_URL)
#   2) postgresql://user:pass@host:port/db
#      -> set DATABASE_URL to the jdbc:... form, and put creds in
#         DATABASE_USERNAME / DATABASE_PASSWORD env vars.
# The cleanest setup on Railway: use the "Postgres" template, then in the
# backend service's variables tab, reference:
#   DATABASE_URL      = jdbc:postgresql://${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
#   DATABASE_USERNAME = ${{Postgres.PGUSER}}
#   DATABASE_PASSWORD = ${{Postgres.PGPASSWORD}}
#   DATABASE_DRIVER   = org.postgresql.Driver
#   HIBERNATE_DIALECT = org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (only useful in local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JWT ===
app.jwt.secret=${JWT_SECRET:ZHN6anN6c2QyMzg0amRrMnUzdWZkc2tqaG5mZHMyMzg0amRrMnUzdWZkc2tqaG5mZHM=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# === CORS ===
# Same-origin in prod (frontend bundled into the same JAR), so the default
# only matters for local Vite dev (5173). Override with CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# === Static frontend serving ===
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# === Logging ===
logging.level.org.springframework.security=INFO
logging.level.com.taskmanager=INFO
